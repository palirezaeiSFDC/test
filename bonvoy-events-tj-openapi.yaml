    TransactionJournalBatchResponse:
      type: object
      description: >
        Response wrapper containing one result entry per submitted Transaction Journal.
        A 200 HTTP status is returned for all business-logic outcomes (processed, capped, rejected).
        The per-TJ `Status` and `ErrorDescription` fields distinguish success, cap warning,
        and rejection outcomes.
      properties:
        transactionJournals:
          type: array
          description: List of results in the same order as the submitted request.
          items:
            $ref: '#/components/schemas/TransactionJournalResult'

    TransactionJournalResult:
      type: object
      description: >
        Result for a single submitted Transaction Journal. This mirrors the current
        custom Apex response wrapper and intentionally returns only the created TJ
        identifier, final status, and a human-readable warning/error string.
        Covers three outcomes:
          1. Processed — TJ created, no caps triggered; `ErrorDescription = null`.
          2. Processed with warning — TJ created, configured base cap applied;
             `ErrorDescription` contains the fixed cap warning.
          3. Error — TJ NOT retained (request rolled back); configured total points
             cap exceeded or validation failed; `ErrorDescription` contains the
             rejection reason.
      required:
        - Id
        - Name
        - Status
        - ErrorDescription
      properties:
        Id:
          type: string
          nullable: true
          description: >
            Salesforce record Id of the created TransactionJournal.
            Null when `Status = Error` (request rolled back).
          example: "0lVDo000000CaXXMA0"
        Name:
          type: string
          nullable: true
          description: >
            TransactionJournal auto-number/name. Null when `Status = Error`.
          example: "1234567890"
        Status:
          type: string
          description: >
            Final processing status for this TJ.
            `Processed` = TJ created and points awarded (cap may have been applied).
            `Error`     = TJ not retained (200k cap exceeded or member invalid).
          enum:
            - Processed
            - Error
          example: "Processed"
        ErrorDescription:
          type: string
          nullable: true
          description: >
            Null when `Status = Processed` and no warning exists.
            For base-cap warning, fixed value:
            `Reward is over max allowed, so max will be awarded.`
            For total points cap breach, fixed message plus overage amount:
            `You must correct the following error(s) before proceeding:
            Earned Points plus Purchased Points cannot exceed 200,000 points,
            please adjust Purchased Point Value. Overage: 5000`
          example: "Reward is over max allowed, so max will be awarded."
